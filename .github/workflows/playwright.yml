name: Playwright
on:
  # Allow this workflow to be called.
  workflow_call:
    secrets:
      TEST_ENV:
        required: true
        description: 'Environment variables for testing, in the format of KEY=VALUE pairs, separated by newlines.'

# The number of shards the suite is split across. Keep the matrix below and the
# `--shard=i/N` denominator in sync with this by editing both. Each shard runs on
# its own runner with its own fresh Supabase, so shards never contend for the DB.
# The practical floor is ~(per-runner setup) + (the single slowest test file),
# since sharding splits by whole file — beyond that, more shards just burn runner
# minutes. With tests at ~70s/shard the per-runner setup dominates, so 4 shards
# lands at ~the same wall-clock as 6 for two fewer runners.
env:
  SHARD_TOTAL: 4

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel the other shards if one fails — we want the full picture.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
      - name: Install dependencies
        run: npm ci
      - name: Define environment variables for build.
        run: echo "${{ secrets.TEST_ENV }}" > .env
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      # Cache the Supabase Docker images. A cold `supabase start` pulls ~3-5 min
      # of images before the suite can run; restoring them from cache removes
      # that from every shard's critical path. Keyed by config.toml (which pins
      # the service image versions) so a version bump busts the cache.
      - name: Cache Supabase Docker images
        uses: actions/cache@v5
        id: supabase-images
        with:
          path: ~/supabase-images
          # `-v2` salt: the excluded-service set changed (studio, postgres-meta),
          # so bust the old cache and re-save the smaller image tarball.
          key: supabase-images-v2-${{ hashFiles('supabase/config.toml') }}
      - name: Load cached Supabase images
        if: steps.supabase-images.outputs.cache-hit == 'true'
        run: |
          if [ -f ~/supabase-images/images.tar ]; then docker load -i ~/supabase-images/images.tar; fi
      - name: Snapshot baseline Docker images
        if: steps.supabase-images.outputs.cache-hit != 'true'
        # Record repo:tag (not image IDs) — `docker save`/`load` only round-trips
        # the tags that `supabase start` looks images up by.
        run: docker images --format '{{.Repository}}:{{.Tag}}' | grep -v '<none>' | sort -u > /tmp/baseline-images.txt
      - name: Run Playwright tests (sharded)
        run: npx playwright test --shard=${{ matrix.shard }}/${{ env.SHARD_TOTAL }}
      # On a cache miss, save just the images `supabase start` pulled during the
      # test run (diff against the baseline) so the cache action persists them.
      - name: Save Supabase images for cache
        if: ${{ always() && steps.supabase-images.outputs.cache-hit != 'true' }}
        run: |
          mkdir -p ~/supabase-images
          docker images --format '{{.Repository}}:{{.Tag}}' | grep -v '<none>' | sort -u > /tmp/after-images.txt
          comm -13 /tmp/baseline-images.txt /tmp/after-images.txt > /tmp/new-images.txt || true
          if [ -s /tmp/new-images.txt ]; then
            docker save $(cat /tmp/new-images.txt) -o ~/supabase-images/images.tar
          fi
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 7

  merge-reports:
    # Only stitch the shard blobs into one HTML report when a shard actually
    # failed — that's the only time anyone opens it. Each shard already uploads
    # its raw blob-report-* artifact unconditionally, so a green run loses
    # nothing (run `npx playwright merge-reports ./blob-report-*` locally if
    # ever needed), and the ~17s stops taxing every successful deploy.
    if: ${{ failure() }}
    needs: [test]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Download blob reports from all shards
        uses: actions/download-artifact@v7
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - name: Merge blobs into a single HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports
      - name: Upload merged HTML report
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
