name: Deploy to Staging

on:
  push:
    branches: ['dev']
  workflow_dispatch:

jobs:
  unit-tests:
    uses: ./.github/workflows/vitest.yml

  locale-validation:
    uses: ./.github/workflows/locales.yml

  playwright:
    uses: ./.github/workflows/playwright.yml
    secrets:
      TEST_ENV: ${{ secrets.TEST_ENV }}

  rls-tests:
    uses: ./.github/workflows/rls.yml

  migrate:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.STAGING_PROJECT_ID }}

    # Staging is a throwaway test target, so deploy is intentionally NOT gated on
    # the tests — they still run (in parallel, for signal) but a red e2e/unit/rls
    # run won't block the preview. Production (production.yml) keeps the full gate.
    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - run: supabase link --project-ref $SUPABASE_PROJECT_ID
      - run: supabase db push

  vercel:
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    # Deploy after migrations are applied. Not gated on tests (see migrate above);
    # we still order after migrate so schema changes land before the code.
    needs: [migrate]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - run: npm install --global vercel@latest
        name: Install Vercel CLI

      - run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        name: Pull Vercel environment

      - run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        name: Build project

      - run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        name: Deploy to Vercel preview
