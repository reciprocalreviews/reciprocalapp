name: Deploy to Production

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  unit-tests:
    uses: ./.github/workflows/vitest.yml

  locale-validation:
    uses: ./.github/workflows/locales.yml

  playwright:
    uses: ./.github/workflows/playwright.yml
    secrets:
      TEST_ENV: ${{ secrets.TEST_ENV }}

  migrate:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.PRODUCTION_PROJECT_ID }}

    # Only run this if tests were successful
    needs: [unit-tests, playwright, locale-validation]

    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - run: supabase link --project-ref $SUPABASE_PROJECT_ID
      - run: supabase db push

  vercel:
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    # Only deploy after tests pass and migrations are applied
    needs: [unit-tests, playwright, locale-validation, migrate]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - run: npm install --global vercel@latest
        name: Install Vercel CLI

      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        name: Pull Vercel environment

      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        name: Build project

      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        name: Deploy to Vercel production
