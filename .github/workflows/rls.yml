name: RLS Tests

on:
  # Run as its own check on pull requests,
  pull_request:
  # allow the deploy workflows to call it,
  workflow_call:
  # and allow manual runs.
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      # The RLS tests (pg_prove via `supabase test db`) connect straight to
      # Postgres on 54322, so we boot only the db and the auth container. Auth
      # (gotrue) is kept because its startup migrations create the auth.users
      # table that the test fixtures and seed.sql insert into; everything else
      # (PostgREST, Kong, Realtime, Studio, edge runtime, etc.) is unused here.
      - name: Start Supabase (Postgres + auth only)
        run: supabase start --exclude storage-api,imgproxy,logflare,supavisor,vector,edge-runtime,kong,postgrest,realtime,studio,postgres-meta,mailpit

      - name: Run pgTAP RLS tests
        run: supabase test db
